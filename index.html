<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IT Support Problem Playbook</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="wrap">
      <p class="eyebrow">IT Support • Troubleshooting • Security Triage</p>
      <h1>IT Support Problem Playbook</h1>
      <p class="subline">Click a category, choose a problem, then unfold the troubleshooting sections.</p>
    </div>
  </header>

  <main class="wrap">
    <section class="search-panel" aria-label="Search playbooks">
      <label for="searchInput">Search problems</label>
      <input id="searchInput" type="search" placeholder="Search: VPN, MFA, Outlook, DNS, phishing, BitLocker..." />
      <p id="resultCount" class="result-count"></p>
    </section>

    <section id="categoryList" class="category-list" aria-live="polite"></section>
  </main>

  <footer class="footer">
    <p>IT Support Problem Playbook • Aaileen Sarwar Syed</p>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
